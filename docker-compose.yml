services:
  db:
    image: postgres:16-alpine
    container_name: bikeparts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "4432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: bikeparts_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "4001:4001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
      - ./scraper:/scraper
      - uploads_data:/app/uploads

  web:
    build: ./web
    container_name: bikeparts_web
    restart: unless-stopped
    env_file: .env
    ports:
      - "4200:4200"
    depends_on:
      - api
    volumes:
      - ./web/src:/app/src

  scraper:
    build: ./scraper
    container_name: bikeparts_scraper
    env_file: .env
    profiles: ["scraper"]          # ne démarre pas avec `up` classique
    depends_on:
      db:
        condition: service_healthy
    # Lancement : docker-compose --profile scraper run --rm scraper [brand]
    # Exemples   : docker-compose --profile scraper run --rm scraper all
    #              docker-compose --profile scraper run --rm scraper canyon

volumes:
  postgres_data:
  uploads_data:
